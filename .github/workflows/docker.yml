name: Docker CI/CD

on:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Build image untuk dev & main
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dtp-project:latest .

      # Login ke Docker Hub HANYA jika branch main
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Push image HANYA jika branch main
      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dtp-project:latest
